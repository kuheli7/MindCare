services:
  - type: web
    name: mindcare-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:backend
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
